<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Push Notification Site</title>
</head>
<body>
    <h1>Welcome to My Alert Site</h1>
    <p>Tap the button below to allow notifications on this phone.</p>
    
    <!-- This button will trigger the prompt -->
    <button id="enable-push" style="padding: 12px 24px; font-size: 16px;">
        Enable Notifications
    </button>

    <script>
        const pushButton = document.getElementById('enable-push');

        pushButton.addEventListener('click', async () => {
            // Check if the browser supports notifications
            if (!('Notification' in window)) {
                alert('This browser does not support desktop notifications');
                return;
            }

            // Request permission from the user
            const permission = await Notification.requestPermission();
            
            if (permission === 'granted') {
                alert('Success! Permission granted.');
                // This is where you would normally register a service worker
            } else {
                alert('Permission denied or dismissed.');
            }
        });
    </script>
</body>
</html>
