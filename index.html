<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get My Subscription</title>
    <link rel="icon" href="Iconarchive-Fruit-Soft-Illustration-Banana.512.png">
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 20px;">
    <h1>Custom Backend Registration</h1>
    <button id="subscribe-btn" style="padding: 12px 24px; font-size: 16px;">Get My Phone's Address</button>
    
    <h3>Copy this output completely:</h3>
    <textarea id="output" style="width: 90%; height: 200px; font-family: monospace;" readonly placeholder="Your subscription token will appear here..."></textarea>

    <script>
        const btn = document.getElementById('subscribe-btn');
        const output = document.getElementById('output');

        // Helper to convert VAPID key format
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        btn.addEventListener('click', async () => {
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') return alert('Allow permissions first!');

            const reg = await navigator.serviceWorker.ready;
            
            // Replace with your real generated public key
            const publicKey = 'BNZ1CPPeOb8gNw_VOrRtvTiFyhPVpKsZaF0A8TPygCIxaK_RfwhIEc7WdosH0xvL9t3bkRNBg7jGA2UUbYTGDL3';
            
            const subscription = await reg.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(publicKey)
            });

            // Show the raw JSON code on screen
            output.value = JSON.stringify(subscription, null, 2);
        });
    </script>
</body>
</html>
