<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Push Notification Site</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 40px 20px;">

    <h1>Mobile Push Tester</h1>
    <p>Step 1: Grant permission. Step 2: Trigger the test alert.</p>
    
    <button id="enable-push" style="padding: 12px 24px; font-size: 16px; margin: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px;">
        1. Enable Notifications
    </button>

    <button id="send-test" style="padding: 12px 24px; font-size: 16px; margin: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px;">
        2. Send Test Notification
    </button>

    <script>
        const pushButton = document.getElementById('enable-push');
        const testButton = document.getElementById('send-test');
        let swRegistration = null;

        // Automatically register the background service worker when page loads
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/my-push-site/sw.js') // Make sure this matches your repo name!
            .then(reg => {
                swRegistration = reg;
                console.log('Service Worker Registered');
            }).catch(err => console.log('SW Registration Failed', err));
        }

        // Step 1: Request permission
        pushButton.addEventListener('click', async () => {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                alert('Permission granted!');
            } else {
                alert('Permission denied.');
            }
        });

        // Step 2: Send message to the background worker to show the notification
        testButton.addEventListener('click', () => {
            if (Notification.permission !== 'granted') {
                alert('Please click "1. Enable Notifications" first!');
                return;
            }

            if (navigator.serviceWorker.controller) {
                // Send a message to sw.js telling it to fire the notification
                navigator.serviceWorker.controller.postMessage({
                    type: 'TEST_NOTIFICATION'
                });
            } else {
                alert('Service worker not active yet. Try refreshing the page!');
            }
        });
    </script>
</body>
</html>
